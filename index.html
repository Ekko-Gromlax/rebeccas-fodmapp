<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FODM'app">
<meta name="theme-color" content="#f2f5fb">
<meta name="description" content="Rebecca's FODM'app — snel zien wat je darmen wél en niet aankunnen, terwijl je winkelt.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Rebecca's FODM'app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f2f5fb; --card:#ffffff; --surface:#e8edf7; --ink:#16243f; --muted:#6b7589;
    --line:#e1e7f2; --safe:#1f9b56; --limited:#e3a02e; --avoid:#ea5a45; --brand:#2b61df;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:#dbe3f0;
    font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;
    -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    color:var(--ink);
  }
  .shell{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;box-shadow:0 0 60px rgba(20,30,60,.12)}
  .noscroll::-webkit-scrollbar{display:none}
  .noscroll{scrollbar-width:none}
  @keyframes expandIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
  input::placeholder{color:var(--muted);opacity:.8;font-weight:500}
  button{font-family:inherit}

  header{padding:34px 22px 18px}
  .eyebrow{display:flex;align-items:center;gap:7px;margin-bottom:13px}
  .eyebrow span.dot{width:7px;height:7px;border-radius:50%;background:var(--brand)}
  .eyebrow span.txt{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--brand)}
  h1{margin:0;font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:700;letter-spacing:-.035em;line-height:.92;color:var(--brand)}
  .rule{width:58px;height:6px;border-radius:3px;background:var(--brand);margin:14px 0 0}
  .tag{margin:15px 2px 0;color:var(--muted);font-size:15.5px;font-weight:500;line-height:1.4;max-width:300px}

  .sticky{position:sticky;top:0;z-index:20;background:color-mix(in srgb, var(--bg) 86%, transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:12px 18px 14px}
  .searchwrap{position:relative;margin-bottom:14px}
  .searchwrap .ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);display:flex}
  #q{width:100%;padding:15px 44px;border-radius:15px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-family:'Hanken Grotesk';font-size:16px;font-weight:600;outline:none;transition:border-color .15s,box-shadow .15s}
  #q:focus{border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 16%, transparent)}
  #clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:var(--surface);color:var(--ink);width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:13px;font-weight:700;display:none;align-items:center;justify-content:center}
  .chips{display:flex;gap:8px;overflow-x:auto}
  .chip{flex:0 0 auto;padding:9px 16px;border-radius:11px;font-family:'Hanken Grotesk';font-weight:700;font-size:13.5px;cursor:pointer;white-space:nowrap;transition:all .15s;border:none;background:var(--surface);color:var(--muted)}
  .chip.on{background:var(--brand);color:#fff}

  .countbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px 4px}
  .countbar .n{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;letter-spacing:.02em;color:var(--ink)}
  .countbar .n b{color:var(--brand)}
  .countbar .total{font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);opacity:.8}

  main{padding:10px 18px 8px;display:flex;flex-direction:column;gap:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 1px 2px rgba(20,30,20,.04)}
  .card>button.head{display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;cursor:pointer;text-align:left;padding:16px 17px}
  .naam{display:block;font-size:17.5px;font-weight:700;letter-spacing:-.012em;color:var(--ink);line-height:1.15}
  .meta{display:flex;align-items:center;gap:9px;margin-top:8px;flex-wrap:wrap}
  .level{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:7px}
  .lvl-laag{background:var(--safe);color:#fff}
  .lvl-beperkt{background:var(--limited);color:#3a2a06}
  .lvl-niet{background:var(--avoid);color:#fff}
  .cat{font-size:12.5px;font-weight:500;color:var(--muted)}
  .chev{flex:0 0 auto;color:var(--muted);display:flex;transition:transform .22s;opacity:.55}
  .card.open .chev{transform:rotate(180deg);opacity:1}
  .detail{padding:0 17px 18px;animation:expandIn .22s ease}
  .detail .sep{border-top:1px solid var(--line);margin:0 0 16px}
  .portie{padding:14px 15px;border-radius:14px;margin-bottom:16px}
  .portie .lab{display:flex;align-items:center;gap:7px}
  .portie .lab .acc{width:6px;height:6px;border-radius:50%}
  .portie .lab .t{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
  .portie p{margin:7px 0 0;font-size:15px;line-height:1.45;font-weight:600;color:var(--ink)}
  .section{margin-bottom:18px}
  .section .lab{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .section p{margin:7px 0 0;font-size:13.5px;line-height:1.55;font-weight:500;color:var(--muted)}
  .bars{display:flex;flex-direction:column;gap:11px;margin-top:12px}
  .bar{display:flex;align-items:center;gap:12px}
  .bar .blab{flex:0 0 116px;font-size:12.5px;font-weight:600;color:var(--ink)}
  .bar .track{flex:1;height:6px;border-radius:99px;background:var(--surface);overflow:hidden}
  .bar .fill{display:block;height:100%;border-radius:99px}
  .bar .bval{flex:0 0 42px;text-align:right;font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}

  .empty{text-align:center;padding:50px 24px}
  .empty .big{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
  .empty p{margin:10px auto 0;max-width:272px;font-size:14px;font-weight:500;color:var(--muted);line-height:1.5}
  .loading{text-align:center;padding:60px 24px;color:var(--muted);font-weight:600}

  footer{text-align:center;padding:18px 24px 40px}
  footer .a{font-size:12px;font-weight:600;color:var(--muted)}
  footer p{margin:5px 0 0;font-size:11px;font-weight:500;color:var(--muted);opacity:.7}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="eyebrow"><span class="dot"></span><span class="txt">Rebecca's FODMAP-maatje</span></div>
    <h1>FODM'app</h1>
    <div class="rule"></div>
    <p class="tag">Snel zien wat je darmen wél en niet aankunnen — terwijl je winkelt.</p>
  </header>

  <div class="sticky">
    <div class="searchwrap">
      <span class="ico"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.6" y2="16.6"></line></svg></span>
      <input id="q" type="search" placeholder="Zoek een product…" autocomplete="off" autocorrect="off" autocapitalize="off">
      <button id="clear" aria-label="Wissen">✕</button>
    </div>
    <div class="chips noscroll" id="chips"></div>
  </div>

  <div class="countbar">
    <span class="n"><b id="count">0</b> producten</span>
    <span class="total" id="total"></span>
  </div>

  <main id="results"><div class="loading">Laden…</div></main>

  <footer>
    <div class="a">Met zorg voor jou gemaakt</div>
    <p>FODMAP-data ter indicatie · raadpleeg je diëtist bij twijfel</p>
  </footer>
</div>

<script>
const LEVEL = {
  laag:    { short:'Laag',    cls:'lvl-laag',    accent:'var(--safe)'   },
  beperkt: { short:'Beperkt', cls:'lvl-beperkt', accent:'var(--limited)'},
  niet:    { short:'Niet',    cls:'lvl-niet',    accent:'var(--avoid)'  },
};
const BAR = {
  laag:  { t:'Laag',  w:'26%', v:'var(--safe)'    },
  matig: { t:'Matig', w:'60%', v:'var(--limited)' },
  hoog:  { t:'Hoog',  w:'92%', v:'var(--avoid)'   },
};
const BARDEFS = [
  { key:'oligos',   label:'Oligosachariden' },
  { key:'fructose', label:'Fructose' },
  { key:'polyolen', label:'Polyolen' },
  { key:'lactose',  label:'Lactose' },
];
// Ingredients to avoid during the elimination phase (status "niet").
const NIET_TOEGESTAAN = ["Appelextract","Appelvezel","Bloem","Bonenmeel","Cichorei","Droge melkbestanddelen","Erwtenvezel","Erythritol (E968)","Fructo-oligosacchariden (FOS)","Fructose","Fructose-glucose stroop","Fructosestroop","Fruitsap concentraat","Gedroogde knoflook","Gedroogde uien","Gedroogde vruchten","Gerst","Gerstemout","Gerstemoutmeel","Glucose-fructose stroop","Glycerine","GOS","High fructose corn siroop (HFCS)","Honing","Inuline","Isomalt (E953)","Kamut","Knoflook","Lactitol (E966)","Lactulose","Lupine","Maisstroop","Maltitol (E965)","Mannitol (E421)","Melasse","Melkpoeder","Miso","Oligofructose","Polydextrose (E1200)","Sorbitol (E420)","Tarwe","Tarwemeel","Ui","Venkelzaad","Volkoren meel","Wei eiwit concentraat","Weipoeder","Witmeel","Xylitol (E967)"];

let ALLE = [], CATS = [], activeCat = 'Alle', query = '';
const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const norm = s => (s||'').toLowerCase();

function filtered(){
  const q = query.trim().toLowerCase();
  return ALLE.filter(p =>
    (activeCat === 'Alle' || p.categorie === activeCat) &&
    (q === '' || norm(p.naam).includes(q) || norm(p.categorie).includes(q) ||
     norm(p.subcategorie).includes(q) || norm(p.merk).includes(q))
  );
}

function cardHTML(p, i){
  const lm = LEVEL[p.status] || LEVEL.laag;
  return `<div class="card" data-i="${i}">
    <button class="head" data-toggle="${i}">
      <span style="flex:1;min-width:0;">
        <span class="naam">${esc(p.naam)}</span>
        <span class="meta">
          <span class="level ${lm.cls}">${lm.short}</span>
          <span class="cat">${esc(p.subcategorie || p.categorie)}</span>
        </span>
      </span>
      <span class="chev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
    </button>
  </div>`;
}

function detailHTML(p){
  const lm = LEVEL[p.status] || LEVEL.laag;
  let h = `<div class="detail"><div class="sep"></div>`;
  if (p.opmerking){
    h += `<div class="portie" style="background:color-mix(in srgb, ${lm.accent} 9%, var(--card));">
      <div class="lab"><span class="acc" style="background:${lm.accent}"></span><span class="t" style="color:${lm.accent}">Portie-advies</span></div>
      <p>${esc(p.opmerking)}</p></div>`;
  }
  if (p.merk && p.merk !== '—' && p.merk !== 'Alle merken'){
    h += `<div class="section"><div class="lab">Merk</div><p>${esc(p.merk)}</p></div>`;
  }
  if (p.fodmap){
    let bars = '';
    for (const d of BARDEFS){
      const bm = BAR[p.fodmap[d.key]] || BAR.laag;
      bars += `<div class="bar"><span class="blab">${d.label}</span>
        <span class="track"><span class="fill" style="width:${bm.w};background:${bm.v}"></span></span>
        <span class="bval">${bm.t}</span></div>`;
    }
    h += `<div><div class="lab" style="font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">FODMAP-details</div><div class="bars">${bars}</div></div>`;
  }
  h += `</div>`;
  return h;
}

function render(){
  const list = filtered();
  document.getElementById('count').textContent = list.length;
  const wrap = document.getElementById('results');
  if (!list.length){
    wrap.innerHTML = `<div class="empty"><div class="big">Niks gevonden</div><p>Dit product staat (nog) niet in de lijst. Probeer een andere zoekterm of categorie.</p></div>`;
    return;
  }
  wrap.innerHTML = list.map(p => cardHTML(p, ALLE.indexOf(p))).join('');
}

function renderChips(){
  document.getElementById('chips').innerHTML = CATS.map(c =>
    `<button class="chip ${c===activeCat?'on':''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('');
}

// ---- events ----
document.getElementById('q').addEventListener('input', e => {
  query = e.target.value;
  document.getElementById('clear').style.display = query ? 'flex' : 'none';
  render();
});
document.getElementById('clear').addEventListener('click', () => {
  query = ''; const q = document.getElementById('q'); q.value=''; q.focus();
  document.getElementById('clear').style.display='none'; render();
});
document.getElementById('chips').addEventListener('click', e => {
  const b = e.target.closest('[data-cat]'); if (!b) return;
  activeCat = b.dataset.cat; renderChips(); render();
});
document.getElementById('results').addEventListener('click', e => {
  const b = e.target.closest('[data-toggle]'); if (!b) return;
  const card = b.closest('.card'); const i = +b.dataset.toggle;
  if (card.classList.contains('open')){
    card.classList.remove('open');
    const d = card.querySelector('.detail'); if (d) d.remove();
  } else {
    card.classList.add('open');
    card.insertAdjacentHTML('beforeend', detailHTML(ALLE[i]));
  }
});

// ---- load data ----
fetch('data.json', {cache:'no-cache'})
  .then(r => r.json())
  .then(data => {
    const niet = NIET_TOEGESTAAN.map(n => ({
      naam:n, merk:'—', categorie:'Niet toegestaan', status:'niet',
      opmerking:'Vermijden tijdens de eliminatiefase van het FODMAP-dieet.', subcategorie:'Ingrediënten'
    }));
    ALLE = data.concat(niet);
    CATS = ['Alle', ...[...new Set(data.map(d=>d.categorie))].sort((a,b)=>a.localeCompare(b,'nl')), 'Niet toegestaan'];
    document.getElementById('total').textContent = 'van ' + ALLE.length + ' in de app';
    renderChips();
    render();
  })
  .catch(() => {
    document.getElementById('results').innerHTML =
      `<div class="empty"><div class="big">Oeps</div><p>De productenlijst kon niet geladen worden. Check je internetverbinding en probeer opnieuw.</p></div>`;
  });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
